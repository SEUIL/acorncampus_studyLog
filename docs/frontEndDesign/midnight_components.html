<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Midnight Dark Theme - Components</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root {
            --bg-body: #121212;
            --bg-card: #1E1E1E;
            --text-main: #E0E0E0;
            --text-sub: #9E9E9E;
            --border: #333333;
            --accent: #00E676;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 40px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: var(--bg-card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); }
        h1 { font-size: 24px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; color: var(--accent); }
        h2 { font-size: 18px; margin-top: 30px; color: var(--text-main); }
        
        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-family: inherit; transition: 0.2s; font-size: 14px; }
        .btn-primary { background: var(--accent); color: #121212; }
        .btn-primary:hover { opacity: 0.8; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-outline:hover { background: rgba(0, 230, 118, 0.1); }
        .btn-disabled { background: #252525; color: #555; border: 1px solid var(--border); cursor: not-allowed; }

        /* List */
        .list { list-style: none; padding: 0; margin: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .list-item { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); transition: background 0.2s; }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: #252525; border-left: 3px solid var(--accent); padding-left: 17px; }
        .list-title { font-weight: 600; font-size: 15px; }
        .tag { font-size: 12px; border: 1px solid var(--accent); padding: 3px 7px; border-radius: 4px; color: var(--accent); }

        /* Form Elements */
        .input-group { margin-bottom: 15px; }
        .input-label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--text-sub); font-weight: 600; }
        .input-text { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; background: #121212; color: var(--text-main); box-sizing: border-box; }
        .input-text:focus { outline: none; border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Midnight Dark Theme UI</h1>
        
        <h2>1. Buttons</h2>
        <div class="btn-group">
            <button class="btn btn-primary">게시글 작성</button>
            <button class="btn btn-outline">취소</button>
            <button class="btn btn-disabled" disabled>비활성화</button>
        </div>

        <h2>2. Form Elements</h2>
        <div class="input-group">
            <label class="input-label">태그 검색</label>
            <input type="text" class="input-text" placeholder="검색어를 입력하세요">
        </div>

        <h2>3. List View</h2>
        <ul class="list">
            <li class="list-item">
                <span class="list-title">Object-Oriented Programming in Java</span>
                <span class="tag">Core</span>
            </li>
            <li class="list-item">
                <span class="list-title">Custom Exception Handling Logic</span>
                <span class="tag">Security</span>
            </li>
            <li class="list-item">
                <span class="list-title">SQL Optimization for Oracle 19c</span>
                <span class="tag">DB</span>
            </li>
        </ul>
    </div>
</body>
</html>
