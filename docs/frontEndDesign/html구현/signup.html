<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디로그 - 회원가입</title>
    <link rel="stylesheet" href="global_theme.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { padding: 0; display: block; background-color: var(--bg-body); }
        .main-wrapper { display: flex; min-height: 100vh; width: 100%; }
        
        .interaction-section { flex: 1.2; background-color: var(--bg-body); display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; padding-bottom: 10px; }
        #jelly-container { width: 80%; height: 70%; max-width: 600px; }
        
        .login-section { flex: 1; background-color: var(--bg-card); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 32px; border-left: 1px solid var(--border-color); box-shadow: -4px 0 15px rgba(0,0,0,0.02); }
        .login-container { width: 100%; max-width: 380px; }
        .login-header { text-align: center; margin-bottom: 30px; }
        
        .text-logo { font-size: 28px; font-weight: 800; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 8px; color: var(--text-main); }
        .login-header h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; color: var(--text-main); border-bottom: none; padding-bottom: 0; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text-sub); }
        .input-control { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 14px; background-color: var(--input-bg); color: var(--text-main); transition: var(--transition-base); font-family: inherit; }
        .input-control:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(96, 125, 139, 0.1); }
        
        .btn-login { width: 100%; padding: 14px; background-color: var(--text-main); color: var(--bg-card); border-radius: var(--radius-sm); font-weight: 700; margin-top: 10px; margin-bottom: 16px; transition: var(--transition-base); border: none; cursor: pointer; font-family: inherit; font-size: 15px; }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-sub); font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }

        .btn-google { width: 100%; padding: 12px; background-color: transparent; border: 1px solid var(--border-color); border-radius: var(--radius-sm); display: flex; justify-content: center; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; color: var(--text-main); transition: var(--transition-base); cursor: pointer; font-family: inherit; }
        .btn-google:hover { background-color: var(--list-hover); border-color: var(--text-main); }
        
        .signup-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-sub); }
        .signup-link a { color: var(--accent-color); font-weight: 700; text-decoration: none; margin-left: 5px; }
        .signup-link a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            .interaction-section { display: none; }
            .login-section { border-left: none; }
        }
    </style>
</head>
<body>
<div class="main-wrapper">
    <section class="interaction-section">
        <svg id="jelly-container" viewBox="0 0 500 400" preserveAspectRatio="xMidYMid meet">
            <g id="char-purple">
                <path class="body" d="M85,360 L85,86 Q85,48 123,48 Q161,48 161,86 L161,360 Z" fill="#7C5CE7"/>
                <circle class="eye-white" cx="104" cy="100" r="7.5" fill="white"/>
                <circle class="pupil" cx="104" cy="100" r="3.5" fill="#222"/>
                <circle class="eye-white" cx="142" cy="100" r="7.5" fill="white"/>
                <circle class="pupil" cx="142" cy="100" r="3.5" fill="#222"/>
            </g>
            <g id="char-orange">
                <path class="body" d="M110,360 L110,271 Q110,186 195,186 Q280,186 280,271 L280,360 Z" fill="#FF9F43"/>
                <circle class="eye-white" cx="165" cy="235" r="13" fill="white"/>
                <circle class="pupil" cx="165" cy="235" r="6" fill="#222"/>
                <circle class="eye-white" cx="225" cy="235" r="13" fill="white"/>
                <circle class="pupil" cx="225" cy="235" r="6" fill="#222"/>
                <path class="mouth" d="M175,258 Q195,274 215,258" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
            </g>
            <g id="char-pink">
                <path class="body" d="M238,360 L238,196 Q238,150 284,150 Q330,150 330,196 L330,360 Z" fill="#E84393"/>
                <circle class="eye-white" cx="263" cy="204" r="9" fill="white"/>
                <circle class="pupil" cx="263" cy="204" r="4.2" fill="#222"/>
                <circle class="eye-white" cx="305" cy="204" r="9" fill="white"/>
                <circle class="pupil" cx="305" cy="204" r="4.2" fill="#222"/>
            </g>
            <g id="char-yellow">
                <path class="body" d="M295,360 L295,310 Q295,250 355,250 Q415,250 415,310 L415,360 Z" fill="#FECA57"/>
                <circle class="pupil" cx="325" cy="316" r="6" fill="#333"/>
                <circle class="pupil" cx="385" cy="316" r="6" fill="#333"/>
                <line class="mouth" x1="328" y1="338" x2="382" y2="338" stroke="#333" stroke-width="3" stroke-linecap="round"/>
            </g>
        </svg>
    </section>

    <section class="login-section">
        <div class="login-container">
            <header class="login-header">
                <div class="text-logo"><i class="fa-solid fa-book-open" style="color: var(--accent-color);"></i> 스터디로그</div>
                <h1>계정 만들기</h1>
                <p class="text-sub">학습 성장을 기록할 준비가 되셨나요?</p>
            </header>

            <form action="login.html" method="get">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" class="input-control" placeholder="example@domain.com" required>
                </div>
                
                <div class="form-group">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" name="nickname" class="input-control" placeholder="사용할 닉네임을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" class="input-control" placeholder="8자 이상 영문, 숫자 조합" required>
                </div>
                
                <div class="form-group">
                    <label for="password_confirm">비밀번호 확인</label>
                    <input type="password" id="password_confirm" name="password_confirm" class="input-control" placeholder="비밀번호를 한 번 더 입력하세요" required>
                </div>

                <button type="submit" class="btn-login">가입하기</button>
                
                <div class="divider">OR</div>

                <button type="button" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" style="width: 18px;">
                    Google 계정으로 가입
                </button>
            </form>

            <div class="signup-link">
                이미 계정이 있으신가요? <a href="login.html">로그인</a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
